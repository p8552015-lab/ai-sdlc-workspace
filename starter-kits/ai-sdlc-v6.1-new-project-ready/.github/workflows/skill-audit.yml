name: Skill Audit
on:
  pull_request:
    paths: ['skills/**', 'pipeline/skill-map.yml', 'scripts/**', '.github/workflows/skill-audit.yml']
  push:
    branches: [main]
    paths: ['skills/**', 'pipeline/skill-map.yml', 'scripts/**', '.github/workflows/skill-audit.yml']
jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install pyyaml
      - run: python scripts/validate_pipeline.py
      - run: bash scripts/bootstrap_external_skills.sh
      - run: python scripts/audit_skills.py
